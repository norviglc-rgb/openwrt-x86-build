# ============================================================
# OpenWrt x86-64 编译设置
# ============================================================

# ===========================================
# 源码配置
# ===========================================
[Source]
# 源码选择: openwrt | lede | immortalwrt
REPO_NAME=lede
# 分支名称
REPO_BRANCH=master

# ===========================================
# 目标平台配置
# ===========================================
[Target]
TARGET=x86
SUBTARGET=64
PROFILE=Generic

# ===========================================
# 固件配置
# ===========================================
[Firmware]
# 文件系统类型: squashfs | ext4
# squashfs: 只读压缩，支持系统还原
# ext4: 可读写，灵活扩展
FILESYSTEM=squashfs
# EFI 启动支持
EFI_BOOT=true
# rootfs 大小 (MB), 仅 ext4 有效
ROOTFS_SIZE=512
# 压缩格式
COMPRESSION=gz

# ===========================================
# 网络配置
# ===========================================
[Network]
# 默认 IP 地址
DEFAULT_IP=192.168.1.1
# 默认网关
DEFAULT_GATEWAY=192.168.1.254
# 默认 DNS
DEFAULT_DNS=8.8.8.8,114.114.114.114

# ===========================================
# 系统配置
# ===========================================
[System]
# 默认密码
DEFAULT_PASSWORD=password
# 时区
TIMEZONE=CST-8
# 主机名
HOSTNAME=OpenWrt-x86
# 默认主题
THEME=argon

# ===========================================
# 插件配置
# ===========================================
[Plugins]
# 包含代理插件 (OpenClash + PassWall)
INCLUDE_PROXY=true
# 包含 Docker 支持
INCLUDE_DOCKER=true
# 包含 QoS 插件 (sqm-autorate)
INCLUDE_QOS=true
# 包含监控插件 (netdata, btop, nlbwmon)
INCLUDE_MONITOR=true
# 包含安全插件 (banip, oaf)
INCLUDE_SECURITY=true

# ===========================================
# 编译配置
# ===========================================
[Build]
# 并行编译线程数 (0 = 自动)
THREADS=0
# 启用 ccache
USE_CCACHE=true
# ccache 大小限制
CCACHE_SIZE=5G
# 详细输出
VERBOSE=false

# ===========================================
# 发布配置
# ===========================================
[Release]
# 保留最近 Release 数量
KEEP_RELEASES=5
# 上传到 Artifacts
UPLOAD_ARTIFACTS=true
# Artifacts 保留天数
ARTIFACTS_DAYS=7
