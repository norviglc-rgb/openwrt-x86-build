# ============================================================
# OpenWrt Feeds Configuration
# 格式: src-git <name> <url> [<branch/revision>]
# ============================================================

# ===========================================
# 官方/主要源 (LEDE/ImmortalWrt/OpenWrt)
# ===========================================
src-git packages https://github.com/coolsnowwolf/packages
src-git luci https://github.com/coolsnowwolf/luci
src-git routing https://git.openwrt.org/feed/routing.git
src-git telephony https://git.openwrt.org/feed/telephony.git

# ===========================================
# 第三方插件源
# ===========================================

# helloworld - 包含 shadowsocks, xray, v2ray, sing-box 等核心
src-git helloworld https://github.com/fw876/helloworld

# PassWall 完整版 (推荐)
src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main

# OpenClash - 代理插件 (可选，需要手动安装)
# src-git openclash https://github.com/vernesong/OpenClash

# ===========================================
# LuCI 主题和扩展
# ===========================================

# Argon 主题
src-git argon https://github.com/jerrykuku/luci-theme-argon

# LuCI 应用扩展
src-git luci_app https://github.com/xiaorouji/openwrt-luci-applications

# ===========================================
# 可选源 (按需取消注释)
# ===========================================

# Docker 管理
# src-git dockerman https://github.com/lisaac/luci-app-dockerman

# HomeProxy (旁路网关)
# src-git homeproxy https://github.com/xiaorouji/openwrt-bypass

# 扩展包
# src-git extra https://github.com/coolsnowwolf/packages
